services:
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-northwind}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - northwind_data:/var/lib/postgresql
      - ./Northwind.backup:/docker-entrypoint-initdb.d/Northwind.backup:ro
      - ./docker/database/01-restore.sh:/docker-entrypoint-initdb.d/01-restore.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-northwind}"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build: ./backend
    environment:
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 2h
      LOG_LEVEL: info
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-northwind}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "3000:3000"
    volumes:
      - backend_logs:/app/logs
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  northwind_data:
  backend_logs:

